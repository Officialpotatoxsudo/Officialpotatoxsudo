<svg xmlns="http://www.w3.org/2000/svg" width="440" height="350" viewBox="0 0 440 350" role="img" aria-label="Top languages">
  <defs>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22d3ee"/><stop offset="55%" stop-color="#a855f7"/><stop offset="100%" stop-color="#ec4899"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;0 0;-1 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <style>
    .title{font-family:"SFMono-Regular",Consolas,monospace;font-size:20px;font-weight:700;fill:url(#acc2);}
    .lbl{font-family:"SFMono-Regular",Consolas,monospace;font-size:14px;fill:#c9d1d9;}
    .pct{font-family:"SFMono-Regular",Consolas,monospace;font-size:13px;fill:#8b949e;}
  </style>
  <rect x="1" y="1" width="438" height="348" rx="16" fill="#0d1117" stroke="#30363d"/>
  <rect x="1" y="1" width="438" height="6" rx="3" fill="url(#acc2)"/>
  <text x="26" y="52" class="title">Top Languages</text>
  <g>
    <text x="26" y="92" class="lbl">Dart</text>
