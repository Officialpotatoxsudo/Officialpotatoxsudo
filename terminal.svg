<svg xmlns="http://www.w3.org/2000/svg" width="560" height="161" viewBox="0 0 560 161" role="img" aria-label="terminal">
  <rect width="560" height="161" rx="14" fill="#0d1117" stroke="#30363d"/>
  <rect x="0" y="0" width="560" height="34" rx="14" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="82" y="22" fill="#8b949e" font-family="monospace" font-size="13">kriman@github ~ </text>
  <g opacity="0">
    <text x="22" y="41" fill="#7ee787" font-family="monospace" font-size="15">$ whoami</text>
    <text x="22" y="61" fill="#c9d1d9" font-family="monospace" font-size="15">Kriman Basnet  ·  @Officialpotatoxsudo</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.6s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text x="22" y="66" fill="#7ee787" font-family="monospace" font-size="15">$ cat role.txt</text>
    <text x="22" y="86" fill="#c9d1d9" font-family="monospace" font-size="15">Builder · Automation · Open Source</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.7s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text x="22" y="92" fill="#7ee787" font-family="monospace" font-size="15">$ cat stack.txt</text>
    <text x="22" y="112" fill="#c9d1d9" font-family="monospace" font-size="15">Python · Go · Bash · Git</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.8s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text x="22" y="118" fill="#7ee787" font-family="monospace" font-size="15">$ ./status.sh</text>
    <text x="22" y="137" fill="#c9d1d9" font-family="monospace" font-size="15">backfilling the timeline ⚡</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.9s" fill="freeze"/>
  </g>
  <text x="22" y="150" fill="#7ee787" font-family="monospace" font-size="15">$ <tspan id="tcur">_</tspan></text>
  <animate xlink:href="#tcur" attributeName="opacity" values="1;0;1" dur="1s" begin="5.0s" repeatCount="indefinite"/>
</svg>